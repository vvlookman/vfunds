[[rules]]
name = "hold_by_cluster_pb"
frequency = "3m"

[rules.options]
limit = 2
lookback_mean_years = 5
lookback_trade_days = 21
pb_quantile_lower = 0.3
pb_quantile_upper = 0.8
roe_quantile_lower = 0.6
weight_method = "filter_max(0.8)"

[rules.search]
