title = "低PB"
description = "持有周期行业中PB偏低的股票"

[[ticker_sources]]
source = "399998.CSI"  # 中证煤炭指数
source_type = "index"

[[ticker_sources]]
source = "000813.CSI"  # 中证细分化工指数
source_type = "index"

